<!DOCTYPE html>
<html>
<head>
    <title>Lembar Jawaban OMR - 30 Soal (2 Kolom)</title>
    <style>
        @page { size: A4; margin: 15mm; }
        body { 
            font-family: Arial, sans-serif; 
            margin: 0;
            padding: 0 20px; /* Sedikit padding kiri kanan */
            color: #000;
        }
        
        /* Header */
        .header {
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 2px solid #000;
            padding-bottom: 10px;
        }
        .header h2 { margin: 0; font-size: 20px; text-transform: uppercase; }
        .header p { margin: 5px 0 0; font-size: 14px; }

        /* Info Siswa */
        .info-siswa {
            margin-bottom: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .info-item label { font-weight: bold; font-size: 14px; margin-right: 5px; }
        .info-item input { 
            border: none; 
            border-bottom: 1px solid #000; 
            width: 150px; 
            font-size: 14px; 
            padding: 2px;
        }

        /* Petunjuk */
        .petunjuk {
            font-size: 12px;
            margin-bottom: 15px;
            padding: 8px;
            background: #eee;
            border-radius: 4px;
        }

        /* Container 2 Kolom */
        .container-soal {
            display: flex;
            justify-content: space-between;
            gap: 40px; /* Jarak antar kolom */
        }
        
        .kolom {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px; /* Jarak antar baris soal */
        }

        /* Baris Soal */
        .soal-row {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .nomor-soal {
            width: 25px;
            font-weight: bold;
            font-size: 14px;
            text-align: right;
            margin-right: 5px;
        }

        .bubble-group {
            display: flex;
            gap: 10px;
        }

        .bubble {
            width: 24px;
            height: 24px;
            border: 2px solid #000;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
            color: #333; /* Warna huruf di dalam bulatan */
        }
        
        /* Footer */
        .footer {
            margin-top: 30px;
            text-align: center;
            font-size: 10px;
            border-top: 1px solid #ccc;
            padding-top: 5px;
        }

        @media print {
            body { padding: 0; }
            .info-item input { border-bottom: 1px solid #000; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h2>Lembar Jawaban Ujian</h2>
        <p>Pilihan Ganda - 30 Soal</p>
    </div>

    <div class="info-siswa">
        <div class="info-item"><label>NIS:</label><input type="text"></div>
        <div class="info-item"><label>Nama:</label><input type="text"></div>
        <div class="info-item"><label>Kelas:</label><input type="text"></div>
    </div>

    <div class="petunjuk">
        <strong>Petunjuk:</strong> Gunakan pensil 2B. Pilih satu jawaban per soal dengan menghitamkan lingkaran.
    </div>

    <!-- Area Soal 2 Kolom -->
    <div class="container-soal">
        <div class="kolom" id="kolom-kiri"></div>
        <div class="kolom" id="kolom-kanan"></div>
    </div>

    <div class="footer">Dokumen ini dibuat oleh Sistem Ujian Digital</div>

    <script>
        const kolomKiri = document.getElementById('kolom-kiri');
        const kolomKanan = document.getElementById('kolom-kanan');
        const options = ['A', 'B', 'C', 'D', 'E'];

        // Fungsi membuat satu baris soal
        function buatBarisSoal(nomor) {
            const row = document.createElement('div');
            row.className = 'soal-row';
            
            const nomorEl = document.createElement('div');
            nomorEl.className = 'nomor-soal';
            nomorEl.textContent = nomor + '.';
            row.appendChild(nomorEl);

            const group = document.createElement('div');
            group.className = 'bubble-group';

            options.forEach(opt => {
                const bubble = document.createElement('div');
                bubble.className = 'bubble';
                bubble.textContent = opt;
                group.appendChild(bubble);
            });

            row.appendChild(group);
            return row;
        }

        // Generate Kolom Kiri (Soal 1-15)
        for (let i = 1; i <= 15; i++) {
            kolomKiri.appendChild(buatBarisSoal(i));
        }

        // Generate Kolom Kanan (Soal 16-30)
        for (let i = 16; i <= 30; i++) {
            kolomKanan.appendChild(buatBarisSoal(i));
        }
    </script>
</body>
</html>
